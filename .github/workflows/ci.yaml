name: Build and Test CI

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    if: github.repository == 'shiv-source/TechTracker'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test -v -race -count=1 ./...

      - name: Build
        run: go build -o bin/main ./cmd/techtracker
